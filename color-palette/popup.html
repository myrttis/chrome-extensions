<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Palette</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <h1 class="title">My Palette</h1>

    <!-- Image Preview -->
    <div class="preview-card" id="previewCard" hidden>
      <img id="previewImage" alt="">
      <button class="preview-remove" id="previewRemove">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- URL Input -->
    <div class="url-input-wrap" id="urlInputWrap">
      <svg class="url-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/>
      </svg>
      <input type="text" class="url-input" id="urlInput" placeholder="Paste image URL here...">
      <button class="url-paste-btn" id="urlPasteBtn" title="Paste from clipboard">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
          <rect x="8" y="2" width="8" height="4" rx="1"/>
        </svg>
      </button>
    </div>

    <!-- Action Buttons -->
    <div class="actions">
      <button class="btn btn-pick" id="pickBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/>
        </svg>
        Pick Colors From Image
      </button>
      <button class="btn btn-generate" id="generateBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
        </svg>
        Generate
      </button>
    </div>

    <!-- Hidden file input -->
    <input type="file" id="fileInput" accept="image/*" hidden>

    <!-- Loading -->
    <div class="loading" id="loading" hidden>
      <div class="spinner"></div>
    </div>

    <!-- Palette Section with Background -->
    <div class="palette-section" id="paletteSection" hidden>
      <!-- Background Image Layer -->
      <div class="palette-bg" id="paletteBg">
        <img id="paletteBgImage" alt="">
        <div class="palette-bg-overlay"></div>
      </div>

      <!-- Swatches on top -->
      <div class="swatches-card" id="swatchesCard">
        <div class="swatches" id="swatches"></div>
      </div>

      <!-- Color Details List -->
      <div class="color-list" id="colorList"></div>

      <!-- Export Bar -->
      <div class="export-bar" id="exportBar">
        <button class="btn btn-save" id="saveBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Save as Image
        </button>
        <button class="btn btn-copy-all" id="copyAllBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          Copy All
        </button>
      </div>
    </div>

    <!-- History Section -->
    <div class="history-section" id="historySection">
      <div class="history-header">
        <span class="history-title">History</span>
        <button class="history-clear" id="historyClear">Clear All</button>
      </div>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
